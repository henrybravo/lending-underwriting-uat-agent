name: Daedalion
on:
  push:
    paths: ['openspec/**']
  pull_request:
    paths: ['openspec/**']
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g daedalion
      - run: daedalion build --dry-run
      - run: daedalion validate
