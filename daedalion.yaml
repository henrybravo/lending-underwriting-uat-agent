version: 1
target: github
openspec: ./openspec
output: ./.github

project_name: my-project  # optional

ci:
  auto_commit: false
  commit_message: 'chore: regenerate agents from specs'

# Agent output configuration
agents:
  target: sdk  # 'ide' or 'sdk'
  #tools: null  # null to use IDE defaults, or array of custom tool names